<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusDev.AI — Engine Pro v4.2</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/tokyo-night-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; }
        
        /* Custom Scrollbar Ringan */
        .no-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .no-scrollbar::-webkit-scrollbar-thumb { background: #312e81; border-radius: 10px; }
        .no-scrollbar::-webkit-scrollbar-track { background: transparent; }
        
        /* Kontainer Kode Responsif & Scrollable */
        .prose pre { 
            background: #070a13 !important; 
            padding: 1rem; 
            margin: 0px !important; 
            overflow-x: auto !important; 
            white-space: pre !important; 
            display: block;
            width: 100%;
            border-radius: 0 0 0.75rem 0.75rem;
        }
        .prose code { 
            font-family: 'JetBrains Mono', monospace; 
            color: #e9d5ff; 
            font-size: 0.85rem; 
            line-height: 1.6;
            white-space: pre !important;
        }
        
        /* Animasi */
        .message-fade-in {
            animation: cubic-bezier(0.16, 1, 0.3, 1) 0.35s forwards msgFade;
        }
        @keyframes msgFade {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .pulse-thinking {
            animation: pulse-text 1.5s infinite ease-in-out;
        }
        @keyframes pulse-text {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; text-shadow: 0 0 8px rgba(168,85,247,0.4); }
        }

        /* Toast Animation */
        .toast-animate {
            animation: toast-in 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards,
                       toast-out 0.3s cubic-bezier(0.6, -0.28, 0.735, 0.045) 2.7s forwards;
        }
        @keyframes toast-in {
            from { transform: translate(-50%, 20px); opacity: 0; }
            to { transform: translate(-50%, 0); opacity: 1; }
        }
        @keyframes toast-out {
            from { transform: translate(-50%, 0); opacity: 1; }
            to { transform: translate(-50%, 20px); opacity: 0; }
        }
        textarea { resize: none; }
    </style>
</head>
<body class="text-slate-200 min-h-screen flex flex-col antialiased selection:bg-purple-500/30 overflow-hidden">

    <div class="fixed top-[-10%] left-[-10%] w-[50vw] h-[50vw] bg-blue-600/5 rounded-full blur-[120px] pointer-events-none z-0"></div>
    <div class="fixed bottom-[-10%] right-[-10%] w-[45vw] h-[45vw] bg-purple-600/5 rounded-full blur-[120px] pointer-events-none z-0"></div>

    <div id="toast-container" class="fixed top-5 left-1/2 -translate-x-1/2 z-[100] flex flex-col gap-2 pointer-events-none w-[90%] max-w-sm"></div>

    <header class="border-b border-slate-900 bg-slate-950/60 backdrop-blur-xl fixed top-0 left-0 right-0 z-50 px-4 md:px-6 py-4 flex justify-between items-center h-[65px]">
        <div class="flex items-center gap-2.5">
            <div class="h-2 w-2 rounded-full bg-purple-500 shadow-[0_0_10px_#a855f7] animate-pulse"></div>
            <div>
                <span class="font-bold tracking-tight text-sm text-white">NexusDev<span class="text-purple-400">.AI</span></span>
                <span class="hidden sm:inline-block text-[10px] text-slate-500 font-mono ml-2">v4.2-pro</span>
            </div>
        </div>
        <div class="text-[10px] font-mono text-slate-400 bg-slate-900/50 px-2.5 py-1 rounded-md border border-slate-800/60">
            CORE: OPTIMIZED_TEXT
        </div>
    </header>

    <main class="w-full max-w-3xl mx-auto flex flex-col h-screen pt-[65px] relative z-10 px-2 sm:px-4">
        
        <div id="chat-box" class="no-scrollbar flex-1 overflow-y-auto px-2 py-6 space-y-8 pb-36">
            
            <div class="flex gap-3 md:gap-4 items-start opacity-90 message-fade-in max-w-[90%] md:max-w-full">
                <div class="w-6 h-6 rounded border border-slate-800 bg-slate-900/60 flex items-center justify-center text-purple-400 shrink-0 mt-0.5">
                    <i class="fa-solid fa-layer-group text-[10px]"></i>
                </div>
                <div class="flex-1 space-y-1.5 text-xs md:text-sm text-slate-400 leading-relaxed">
                    <p class="font-mono text-[10px] text-slate-500 tracking-wider">WORKSPACE INITIALIZED.</p>
                    <p>Halo, Sean. Workspace kodingan telah dioptimalkan agar super ringan dan sepenuhnya responsif. Tulis logika sistem atau kendala kodinganmu di bawah.</p>
                </div>
            </div>

        </div>

        <div class="fixed bottom-0 left-0 right-0 bg-gradient-to-t from-slate-950 via-slate-950/80 to-transparent pt-4 pb-6 px-3 sm:px-4 z-50">
            <div class="max-w-3xl mx-auto bg-slate-900/50 border border-slate-800/80 rounded-xl p-1.5 backdrop-blur-2xl shadow-2xl focus-within:border-purple-500/30 transition-all duration-300">
                
                <form id="chat-form" class="flex items-end gap-2">
                    <textarea 
                        id="user-input"
                        rows="1"
                        placeholder="Ketik instruksi bot atau website di sini..."
                        class="flex-1 bg-transparent border-0 outline-none p-2 text-xs md:text-sm text-slate-100 placeholder-slate-500 focus:ring-0 max-h-32 overflow-y-auto no-scrollbar h-[36px]"
                        autocomplete="off"
                    ></textarea>
                    
                    <button type="submit" id="send-btn" class="h-8 w-8 rounded-lg bg-slate-100 hover:bg-white text-slate-950 flex items-center justify-center transition-all active:scale-95 cursor-pointer shrink-0 shadow-md">
                        <i class="fa-solid fa-arrow-up text-xs"></i>
                    </button>
                </form>
            </div>
        </div>
    </main>

    <script>
        const chatBox = document.getElementById('chat-box');
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const toastContainer = document.getElementById('toast-container');

        // Auto-resize Textarea
        userInput.addEventListener('input', function() {
            this.style.height = '36px';
            this.style.height = Math.min(this.scrollHeight, 128) + 'px';
        });

        marked.setOptions({
            highlight: function(code, lang) {
                const language = hljs.getLanguage(lang) ? lang : 'plaintext';
                return hljs.highlight(code, { language }).value;
            },
            breaks: true
        });

        // Toast Notification Function
        function showToast(message, type = 'error') {
            const toast = document.createElement('div');
            toast.className = `toast-animate flex items-center gap-2.5 px-4 py-2.5 rounded-lg border text-xs font-mono shadow-xl backdrop-blur-md w-full bg-slate-950/90 ${
                type === 'success' ? 'border-emerald-500/30 text-emerald-400' : 'border-rose-500/30 text-rose-400'
            }`;
            
            const icon = type === 'success' ? 'fa-circle-check' : 'fa-circle-exclamation';
            toast.innerHTML = `<i class="fa-solid ${icon}"></i> <span>${message}</span>`;
            
            toastContainer.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        const SYSTEM_PROMPT = `You are NexusDev.AI, an expert Fullstack Software Engineer. 
Provide professional, clean, and highly modular source code for backend services, responsive websites, or Discord bot architectures (discord.js).
Always guide the user to separate sensitive tokens inside a 'config.json' file instead of hardcoding them into the core logic file. 
When asked to build a discord bot core setup, write the code inside a file architecture concept named 'merpati.js'. Speak in Indonesian language.`;

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const message = userInput.value.trim();
            
            // Validasi input kosong (Permintaan Tambahan)
            if (!message) {
                showToast("Input tidak boleh kosong! Ketik instruksi kodinganmu dulu.", "error");
                return;
            }

            appendMessage('user', message);
            
            userInput.value = '';
            userInput.style.height = '36px';
            setLoading(true);

            // ANIMASI PROGRES BERFIKIR (Permintaan Tambahan)
            const botMessageId = appendMessage('bot', `
                <div class="flex items-center gap-2.5 text-purple-400 font-mono text-xs py-1 pulse-thinking">
                    <i class="fa-solid fa-circle-notch animate-spin text-[11px]"></i>
                    <span>Sedang berpikir...</span>
                </div>
            `);

            try {
                const response = await fetch('https://text.pollinations.ai/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        messages: [
                            { role: "system", content: SYSTEM_PROMPT },
                            { role: "user", content: message }
                        ],
                        model: "openai", 
                        jsonMode: false
                    })
                });

                if (!response.ok) throw new Error('API Exception Error');

                const data = await response.text();
                updateBotMessage(botMessageId, data);
                showToast("Respons berhasil dimuat!", "success"); // Notifikasi Selesai

            } catch (error) {
                console.error(error);
                updateBotMessage(botMessageId, `<span class="text-rose-400 font-mono text-xs"><i class="fa-solid fa-triangle-exclamation mr-1"></i> Gagal memproses respons. Silakan kirim ulang perintah kamu.</span>`);
                showToast("Terjadi gangguan koneksi API.", "error");
            } finally {
                setLoading(false);
            }
        });

        function appendMessage(sender, text) {
            const id = 'msg-' + Date.now();
            const msgDiv = document.createElement('div');
            const isUser = sender === 'user';
            
            msgDiv.className = `flex gap-3 md:gap-4 items-start message-fade-in ${isUser ? 'justify-end' : ''}`;

            msgDiv.innerHTML = `
                ${!isUser ? `
                    <div class="w-6 h-6 rounded border border-slate-800 bg-slate-900/60 flex items-center justify-center text-purple-400 shrink-0 mt-1">
                        <i class="fa-solid fa-terminal text-[10px]"></i>
                    </div>
                ` : ''}
                <div id="${id}" class="${isUser ? 'bg-slate-900 border border-slate-800/60 rounded-xl px-3.5 py-2 max-w-[85%] text-xs md:text-sm text-slate-200 shadow-sm' : 'flex-1 text-xs md:text-sm text-slate-300 leading-relaxed prose pl-3 border-l-2 border-purple-500/30 overflow-hidden'}">
                    ${isUser ? escapeHTML(text) : text}
                </div>
            `;
            
            chatBox.appendChild(msgDiv);
            chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });
            return id;
        }

        function updateBotMessage(id, rawMarkdown) {
            const container = document.getElementById(id);
            let htmlContent = marked.parse(rawMarkdown);
            container.innerHTML = htmlContent;

            container.querySelectorAll('pre').forEach((preElement) => {
                const wrapper = document.createElement('div');
                wrapper.className = "my-3 border border-slate-800/80 rounded-xl overflow-hidden shadow-md group/code relative w-full block max-w-full";
                
                let detectedLang = "CODE";
                const codeClass = preElement.querySelector('code')?.className || "";
                
                if(codeClass.includes('language-')) {
                    detectedLang = codeClass.split('language-')[1].toUpperCase();
                }

                const topBar = document.createElement('div');
                topBar.className = "bg-[#070a12] px-4 py-2 text-[10px] font-mono text-slate-400 border-b border-slate-900/80 flex justify-between items-center select-none";
                topBar.innerHTML = `
                    <span class="font-medium text-slate-300">${detectedLang}</span>
                    <div class="flex items-center gap-3">
                        <button onclick="copyCodeToClipboard(this)" class="hover:text-purple-400 transition-colors flex items-center gap-1 cursor-pointer">
                            <i class="fa-regular fa-copy text-[10px]"></i> <span>Copy</span>
                        </button>
                    </div>
                `;

                preElement.parentNode.insertBefore(wrapper, preElement);
                wrapper.appendChild(topBar);
                wrapper.appendChild(preElement);
            });

            container.querySelectorAll('pre code').forEach((el) => {
                hljs.highlightElement(el);
            });

            chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });
        }

        window.copyCodeToClipboard = function(buttonElement) {
            const preBlock = buttonElement.closest('.group\\/code').querySelector('pre');
            const actualCode = preBlock.textContent;

            navigator.clipboard.writeText(actualCode).then(() => {
                const span = buttonElement.querySelector('span');
                const icon = buttonElement.querySelector('i');
                span.textContent = "Copied!";
                icon.className = "fa-solid fa-check text-[10px] text-emerald-400";
                setTimeout(() => {
                    span.textContent = "Copy";
                    icon.className = "fa-regular fa-copy text-[10px]";
                }, 2000);
            });
        };

        function setLoading(isLoading) {
            userInput.disabled = isLoading;
            sendBtn.disabled = isLoading;
            if(!isLoading) {
                userInput.focus();
            }
        }

        function escapeHTML(str) {
            if(str.includes('pulse-thinking') || str.includes('text-rose-400')) return str;
            return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag));
        }
    </script>
</body>
    </html>
