<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusDev.AI — Engine Pro v4.2</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/tokyo-night-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #030712; }
        .no-scrollbar::-webkit-scrollbar { width: 4px; }
        .no-scrollbar::-webkit-scrollbar-thumb { background: #1e1b4b; border-radius: 10px; }
        
        /* FIX: Pencegahan Kode Keluar Kotak (Force Word Wrap & Break Words) */
        pre, code {
            white-space: pre-wrap !important;
            word-wrap: break-word !important;
            word-break: break-all !important;
        }
        .prose pre { background: #070a13 !important; padding: 1.25rem; margin: 0px !important; }
        .prose code { font-family: 'JetBrains Mono', monospace; color: #f3e8ff; font-size: 0.85rem; line-height: 1.6; }
        
        /* Animasi Masuk Pesan Smooth */
        .message-fade-in {
            animation: cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards msgFade;
        }
        @keyframes msgFade {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        textarea { resize: none; }
    </style>
</head>
<body class="text-slate-200 min-h-screen flex flex-col antialiased selection:bg-purple-500/30 overflow-hidden">

    <div class="fixed top-[-15%] left-[-10%] w-[60vw] h-[60vw] bg-blue-900/10 rounded-full blur-[140px] pointer-events-none z-0"></div>
    <div class="fixed bottom-[-10%] right-[-10%] w-[50vw] h-[50vw] bg-purple-900/10 rounded-full blur-[120px] pointer-events-none z-0"></div>

    <header class="border-b border-slate-900/60 bg-slate-950/40 backdrop-blur-xl fixed top-0 left-0 right-0 z-50 px-6 py-4 flex justify-between items-center h-[65px]">
        <div class="flex items-center gap-3">
            <div class="h-2 w-2 rounded-full bg-purple-500 shadow-[0_0_10px_#a855f7] animate-pulse"></div>
            <div>
                <span class="font-bold tracking-tight text-sm text-white">NexusDev<span class="text-purple-400">.AI</span></span>
                <span class="text-[10px] text-slate-500 font-mono ml-2">v4.2-media</span>
            </div>
        </div>
        <div class="text-[10px] font-mono text-slate-400 bg-slate-900/40 px-2.5 py-1 rounded-md border border-slate-800/60 tracking-wider">
            CORE: FULLSTACK_ENGINE
        </div>
    </header>

    <main class="w-full max-w-2xl mx-auto flex flex-col h-screen pt-[65px] relative z-10">
        
        <div id="chat-box" class="no-scrollbar flex-1 overflow-y-auto px-4 py-6 space-y-10 pb-52">
            
            <div class="flex gap-4 items-start opacity-90 message-fade-in">
                <div class="w-6 h-6 rounded border border-slate-800 bg-slate-900/40 flex items-center justify-center text-purple-400 shrink-0 mt-0.5">
                    <i class="fa-solid fa-layer-group text-[10px]"></i>
                </div>
                <div class="flex-1 space-y-2 text-sm text-slate-400 leading-relaxed">
                    <p class="font-mono text-xs text-slate-500 tracking-wider">WORKSPACE INITIALIZED.</p>
                    <p>Halo, Sean. Ruang pengembangan bot, koding backend, dan analisis UI via unggah foto siap digunakan. Kirimkan gambar atau instruksi logika yang ingin kamu bangun.</p>
                </div>
            </div>

        </div>

        <div class="fixed bottom-0 left-0 right-0 bg-gradient-to-t from-slate-950 via-slate-950/90 to-transparent pt-6 pb-6 px-4 z-50">
            <div class="max-w-2xl mx-auto bg-slate-900/60 border border-slate-800/80 rounded-2xl p-2 backdrop-blur-2xl shadow-2xl focus-within:border-purple-500/40 focus-within:shadow-[0_0_30px_rgba(168,85,247,0.08)] transition-all duration-300 flex flex-col gap-2">
                
                <div id="image-preview-container" class="hidden items-center gap-2 p-2 bg-slate-950/80 border border-slate-800 rounded-xl w-fit relative group">
                    <img id="image-preview" src="" alt="Preview" class="h-14 w-14 object-cover rounded-lg border border-slate-700">
                    <button type="button" id="remove-image-btn" class="absolute -top-1.5 -right-1.5 h-5 w-5 bg-rose-500 hover:bg-rose-600 text-white rounded-full flex items-center justify-center text-[10px] cursor-pointer shadow-md">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>

                <form id="chat-form" class="flex items-end gap-2">
                    <input type="file" id="file-input" accept="image/*" class="hidden">
                    
                    <button type="button" id="attach-btn" class="h-9 w-9 rounded-xl bg-slate-800/80 hover:bg-slate-800 text-slate-300 flex items-center justify-center transition-all cursor-pointer shrink-0 mb-0.5 border border-slate-700/50">
                        <i class="fa-regular fa-image text-sm"></i>
                    </button>

                    <textarea 
                        id="user-input"
                        rows="1"
                        placeholder="Ketik instruksi atau lampirkan foto UI..."
                        class="flex-1 bg-transparent border-0 outline-none p-2 text-sm text-slate-100 placeholder-slate-500 focus:ring-0 max-h-36 overflow-y-auto no-scrollbar h-[38px]"
                        required
                        autocomplete="off"
                    ></textarea>
                    
                    <button type="submit" id="send-btn" class="h-9 w-9 rounded-xl bg-slate-100 hover:bg-white text-slate-950 flex items-center justify-center transition-all active:scale-95 cursor-pointer shrink-0 shadow-md mb-0.5">
                        <i class="fa-solid fa-arrow-up text-xs"></i>
                    </button>
                </form>
            </div>
        </div>
    </main>

    <script>
        const chatBox = document.getElementById('chat-box');
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const fileInput = document.getElementById('file-input');
        const attachBtn = document.getElementById('attach-btn');
        const imagePreviewContainer = document.getElementById('image-preview-container');
        const imagePreview = document.getElementById('image-preview');
        const removeImageBtn = document.getElementById('remove-image-btn');

        let selectedImageBase64 = "";

        // Triger klik input file lewat icon image
        attachBtn.addEventListener('click', () => fileInput.click());

        // Handle event ketika foto dipilih
        fileInput.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    selectedImageBase64 = e.target.result;
                    imagePreview.src = selectedImageBase64;
                    imagePreviewContainer.style.display = 'flex'; // Munculkan preview kotak foto
                    userInput.required = false; // Jika kirim gambar, teks boleh kosong
                }
                reader.readAsDataURL(file);
            }
        });

        // Hapus attachment gambar
        removeImageBtn.addEventListener('click', () => {
            selectedImageBase64 = "";
            fileInput.value = "";
            imagePreviewContainer.style.display = 'none';
            userInput.required = true;
        });

        // Auto-resize textarea teks ke bawah pas ngetik panjang
        userInput.addEventListener('input', function() {
            this.style.height = '38px';
            this.style.height = (this.scrollHeight) + 'px';
        });

        marked.setOptions({
            highlight: function(code, lang) {
                const language = hljs.getLanguage(lang) ? lang : 'plaintext';
                return hljs.highlight(code, { language }).value;
            },
            breaks: true
        });

        const SYSTEM_PROMPT = `You are NexusDev.AI, an expert Fullstack Software Engineer. 
Provide professional, clean, and highly modular source code for backend services, responsive websites, or Discord bot architectures (discord.js).
Always guide the user to separate sensitive tokens inside a 'config.json' file instead of hardcoding them into the core logic file. 
When asked to build a discord bot core setup, write the code inside a file architecture concept named 'merpati.js'. Speak in Indonesian language.`;

        function generateDynamicSteps(promptText) {
            const text = promptText.toLowerCase();
            if (selectedImageBase64) {
                return [
                    "Mengompresi data visual media...",
                    "Mengekstrak komponen UI dari gambar...",
                    "Menganalisis arsitektur rancangan visual...",
                    "Menyusun respons solusi koding kompilasi..."
                ];
            }
            if (text.includes('web') || text.includes('page') || text.includes('html') || text.includes('css')) {
                return [
                    "Menganalisis skema layout UI...",
                    "Menyusun berkas 'index.html'...",
                    "Menginjeksikan utilitas gaya Tailwind CSS...",
                    "Menampilkan kode sumber website lengkap..."
                ];
            }
            if (text.includes('bot') || text.includes('discord') || text.includes('dc')) {
                return [
                    "Menginisialisasi modul Discord.js v14...",
                    "Memetakan konfigurasi token ke 'config.json'...",
                    "Membangun arsitektur core handler 'merpati.js'...",
                    "Menampilkan instruksi & kode bot lengkap..."
                ];
            }
            return [
                "Menginisialisasi lingkungan sandbox...",
                "Membaca spesifikasi instruksi logika...",
                "Memformat kode ke standar produksi clean-code...",
                "Menampilkan hasil kompilasi skrip..."
            ];
        }

        let loadingInterval;

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const message = userInput.value.trim();
            if (!message && !selectedImageBase64) return;

            // Render bubble user chat ke interface
            appendMessage('user', message, selectedImageBase64);
            
            // Backup asset data sebelum form di-clear
            const activeImage = selectedImageBase64;
            const activeMessage = message;

            // Reset Form Input & Status UI
            userInput.value = '';
            userInput.style.height = '38px';
            selectedImageBase64 = "";
            fileInput.value = "";
            imagePreviewContainer.style.display = 'none';
            userInput.required = true;
            setLoading(true);

            const currentLoadingSteps = generateDynamicSteps(activeMessage);
            const botMessageId = appendMessage('bot', `
                <div class="flex items-center gap-2.5 text-slate-400 font-mono text-xs py-1">
                    <i class="fa-solid fa-circle-notch animate-spin text-purple-400"></i>
                    <span id="loading-text-log">${currentLoadingSteps[0]}</span>
                </div>
            `);

            let stepIndex = 0;
            const logElement = document.getElementById('loading-text-log');
            loadingInterval = setInterval(() => {
                if (stepIndex < currentLoadingSteps.length - 1) {
                    stepIndex++;
                    if(logElement) logElement.textContent = currentLoadingSteps[stepIndex];
                }
            }, 900);

            try {
                // Membangun payload pesan untuk API Pollinations
                let apiMessages = [
                    { role: "system", content: SYSTEM_PROMPT }
                ];

                if (activeImage) {
                    // Masukkan multimodal format array jika mendeteksi payload gambar base64
                    apiMessages.push({
                        role: "user",
                        content: [
                            { type: "text", text: activeMessage || "Analisis gambar kodingan berikut ini." },
                            { type: "image_url", image_url: { url: activeImage } }
                        ]
                    });
                } else {
                    apiMessages.push({ role: "user", content: activeMessage });
                }

                const response = await fetch('https://text.pollinations.ai/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        messages: apiMessages,
                        model: "openai", // OpenAI model di Pollinations mendukung multimodal image input
                        jsonMode: false
                    })
                });

                if (!response.ok) throw new Error('Network Exception');

                const data = await response.text();
                clearInterval(loadingInterval);
                updateBotMessage(botMessageId, data);

            } catch (error) {
                console.error(error);
                clearInterval(loadingInterval);
                updateBotMessage(botMessageId, `<span class="text-rose-400 font-mono text-xs"><i class="fa-solid fa-triangle-exclamation mr-1"></i> Gagal memproses data. Silakan coba kembali.</span>`);
            } finally {
                setLoading(false);
            }
        });

        function appendMessage(sender, text, imageBase64 = "") {
            const id = 'msg-' + Date.now();
            const msgDiv = document.createElement('div');
            const isUser = sender === 'user';
            
            msgDiv.className = `flex gap-4 items-start message-fade-in ${isUser ? 'justify-end' : ''}`;
            
            let messageContentHTML = "";
            if (imageBase64) {
                messageContentHTML += `<img src="${imageBase64}" class="max-w-[200px] rounded-xl border border-slate-800 shadow-md block mb-2">`;
            }
            if (text) {
                messageContentHTML += isUser ? escapeHTML(text) : text;
            } else if (!text && isUser && imageBase64) {
                messageContentHTML += `<span class="text-xs text-slate-500 italic">Mengirim gambar...</span>`;
            }

            msgDiv.innerHTML = `
                ${!isUser ? `
                    <div class="w-6 h-6 rounded border border-slate-800 bg-slate-900/60 flex items-center justify-center text-purple-400 shrink-0 mt-1">
                        <i class="fa-solid fa-terminal text-[10px]"></i>
                    </div>
                ` : ''}
                <div id="${id}" class="${isUser ? 'bg-slate-900 border border-slate-800/80 rounded-xl px-4 py-2.5 max-w-[85%] text-sm text-slate-200' : 'flex-1 text-sm text-slate-300 leading-relaxed prose pl-3 border-l-2 border-purple-500/40'}">
                    ${messageContentHTML}
                </div>
            `;
            
            chatBox.appendChild(msgDiv);
            chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });
            return id;
        }

        function updateBotMessage(id, rawMarkdown) {
            const container = document.getElementById(id);
            let htmlContent = marked.parse(rawMarkdown);
            container.innerHTML = htmlContent;

            container.querySelectorAll('pre').forEach((preElement) => {
                const wrapper = document.createElement('div');
                wrapper.className = "my-4 border border-slate-800/80 rounded-xl overflow-hidden shadow-lg group/code relative w-full";
                
                let detectedLang = "CODE";
                const codeClass = preElement.querySelector('code')?.className || "";
                
                if(codeClass.includes('language-')) {
                    detectedLang = codeClass.split('language-')[1].toUpperCase();
                }

                const topBar = document.createElement('div');
                topBar.className = "bg-[#070a12] px-4 py-2.5 text-[11px] font-mono text-slate-400 border-b border-slate-900 flex justify-between items-center select-none";
                topBar.innerHTML = `
                    <span class="font-medium text-slate-300">${detectedLang}</span>
                    <div class="flex items-center gap-3">
                        <button onclick="copyCodeToClipboard(this)" class="hover:text-purple-400 transition-colors flex items-center gap-1 cursor-pointer">
                            <i class="fa-regular fa-copy text-[10px]"></i> <span>Copy</span>
                        </button>
                        <button onclick="downloadCodeFile(this, '${detectedLang}')" class="hover:text-purple-400 transition-colors flex items-center gap-1 cursor-pointer">
                            <i class="fa-solid fa-arrow-down-to-line text-[10px]"></i> <span>Download</span>
                        </button>
                    </div>
                `;

                preElement.parentNode.insertBefore(wrapper, preElement);
                wrapper.appendChild(topBar);
                wrapper.appendChild(preElement);
            });

            container.querySelectorAll('pre code').forEach((el) => {
                hljs.highlightElement(el);
            });

            chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });
        }

        window.copyCodeToClipboard = function(buttonElement) {
            const preBlock = buttonElement.closest('.group\\/code').querySelector('pre');
            const actualCode = preBlock.textContent;

            navigator.clipboard.writeText(actualCode).then(() => {
                const span = buttonElement.querySelector('span');
                const icon = buttonElement.querySelector('i');
                span.textContent = "Copied!";
                icon.className = "fa-solid fa-check text-[10px] text-emerald-400";
                setTimeout(() => {
                    span.textContent = "Copy";
                    icon.className = "fa-regular fa-copy text-[10px]";
                }, 2000);
            });
        };

        window.downloadCodeFile = function(buttonElement, language) {
            const preBlock = buttonElement.closest('.group\\/code').querySelector('pre');
            const actualCode = preBlock.textContent;

            let ext = "txt";
            const langLower = language.toLowerCase();
            if (langLower.includes("js") || langLower.includes("javascript")) ext = "js";
            else if (langLower.includes("json")) ext = "json";
            else if (langLower.includes("py") || langLower.includes("python")) ext = "py";
            else if (langLower.includes("html")) ext = "html";
            else if (langLower.includes("css")) ext = "css";

            const blob = new Blob([actualCode], { type: "text/plain;charset=utf-8" });
            const url = URL.createObjectURL(blob);
