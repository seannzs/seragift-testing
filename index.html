<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusDev.AI — Ultimate Engine</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/tokyo-night-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; }
        .no-scrollbar::-webkit-scrollbar { width: 4px; }
        .no-scrollbar::-webkit-scrollbar-thumb { background: #1e1b4b; border-radius: 10px; }
        
        /* Custom Rendering Code Block Premium dengan Container Actions */
        .prose pre { background: #070a13 !important; padding: 1.25rem; margin: 0px !important; overflow-x: auto; }
        .prose code { font-family: 'JetBrains Mono', monospace; color: #e9d5ff; font-size: 0.85rem; }
        
        /* Animasi Masuk Pesan */
        .message-fade-in {
            animation: cubic-bezier(0.16, 1, 0.3, 1) 0.6s forwards msgFade;
        }
        @keyframes msgFade {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="text-slate-200 min-h-screen flex flex-col antialiased selection:bg-purple-500/30 overflow-hidden">

    <div class="fixed top-[-15%] left-[-10%] w-[60vw] h-[60vw] bg-blue-900/10 rounded-full blur-[140px] pointer-events-none z-0"></div>
    <div class="fixed bottom-[-10%] right-[-10%] w-[50vw] h-[50vw] bg-purple-900/10 rounded-full blur-[120px] pointer-events-none z-0"></div>

    <header class="border-b border-slate-900/60 bg-slate-950/40 backdrop-blur-xl fixed top-0 left-0 right-0 z-50 px-6 py-4 flex justify-between items-center h-[65px]">
        <div class="flex items-center gap-3">
            <div class="h-2 w-2 rounded-full bg-purple-500 shadow-[0_0_10px_#a855f7] animate-pulse"></div>
            <div>
                <span class="font-bold tracking-tight text-sm text-white">NexusDev<span class="text-purple-400">.AI</span></span>
                <span class="text-[10px] text-slate-500 font-mono ml-2">v3.9-ultimate</span>
            </div>
        </div>
        <div class="text-[10px] font-mono text-slate-400 bg-slate-900/40 px-2.5 py-1 rounded-md border border-slate-800/60 tracking-wider">
            CORE: FULLSTACK_ENGINE
        </div>
    </header>

    <main class="w-full max-w-2xl mx-auto flex flex-col h-screen pt-[65px] relative z-10">
        
        <div id="chat-box" class="no-scrollbar flex-1 overflow-y-auto px-4 py-6 space-y-10 pb-36">
            
            <div class="flex gap-4 items-start opacity-90 message-fade-in">
                <div class="w-6 h-6 rounded border border-slate-800 bg-slate-900/40 flex items-center justify-center text-purple-400 shrink-0 mt-0.5">
                    <i class="fa-solid fa-layer-group text-[10px]"></i>
                </div>
                <div class="flex-1 space-y-2 text-sm text-slate-400 leading-relaxed">
                    <p class="font-mono text-xs text-slate-500 tracking-wider">WORKSPACE INITIALIZED.</p>
                    <p>Halo, Sean. Ruang pengembangan bot, koding backend, dan web arsitektur siap digunakan. Kirimkan logika script atau rancangan modul yang ingin kamu bangun.</p>
                </div>
            </div>

        </div>

        <div class="fixed bottom-0 left-0 right-0 bg-gradient-to-t from-slate-950 via-slate-950/90 to-transparent pt-10 pb-6 px-4 z-50">
            <div class="max-w-2xl mx-auto bg-slate-900/50 border border-slate-800/80 rounded-2xl p-1.5 backdrop-blur-2xl shadow-2xl focus-within:border-purple-500/30 focus-within:shadow-[0_0_30px_rgba(168,85,247,0.05)] transition-all duration-300">
                <form id="chat-form" class="flex items-center gap-2">
                    <input 
                        id="user-input"
                        type="text"
                        placeholder="Ketik instruksi koding bot atau website..."
                        class="flex-1 bg-transparent border-0 outline-none p-3 text-sm text-slate-100 placeholder-slate-500 focus:ring-0"
                        required
                        autocomplete="off"
                    />
                    <button type="submit" id="send-btn" class="h-9 w-9 rounded-xl bg-slate-100 hover:bg-white text-slate-950 flex items-center justify-center transition-all active:scale-95 cursor-pointer shrink-0 shadow-md">
                        <i class="fa-solid fa-arrow-up text-xs"></i>
                    </button>
                </form>
            </div>
        </div>
    </main>

    <script>
        const chatBox = document.getElementById('chat-box');
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        marked.setOptions({
            highlight: function(code, lang) {
                const language = hljs.getLanguage(lang) ? lang : 'plaintext';
                return hljs.highlight(code, { language }).value;
            },
            breaks: true
        });

        const SYSTEM_PROMPT = `You are NexusDev.AI, an expert Fullstack Software Engineer. 
Provide professional, clean, and highly modular source code for backend services, responsive websites, or Discord bot architectures (discord.js).
Always guide the user to separate sensitive tokens inside a 'config.json' file instead of hardcoding them into the core logic file. 
When asked to build a discord bot core setup, write the code inside a file architecture concept named 'merpati.js'. Speak in Indonesian language.`;

        // Generator Animasi Teks Dinamis Berdasarkan Input User
        function generateDynamicSteps(promptText) {
            const text = promptText.toLowerCase();
            
            if (text.includes('web') || text.includes('page') || text.includes('html') || text.includes('css')) {
                return [
                    "Menganalisis struktur tata letak UI...",
                    "Menyusun struktur berkas 'index.html'...",
                    "Menginjeksikan utilitas gaya 'Tailwind CSS'...",
                    "Merancang komponen navigasi & interaksi modern...",
                    "Mengoptimalkan performa rendering halaman...",
                    "Menampilkan kode sumber website lengkap..."
                ];
            }
            
            if (text.includes('bot') || text.includes('discord') || text.includes('dc')) {
                return [
                    "Menginisialisasi modul Discord.js v14...",
                    "Memetakan konfigurasi token ke 'config.json'...",
                    "Membangun arsitektur core handler 'merpati.js'...",
                    "Menyusun pendaftaran Global Slash Commands...",
                    "Mengoptimalkan penanganan interaksi event...",
                    "Menampilkan instruksi & kode bot lengkap..."
                ];
            }

            if (text.includes('sql') || text.includes('database') || text.includes('db') || text.includes('backend') || text.includes('query')) {
                return [
                    "Memeriksa skema entitas database...",
                    "Menganalisis celah kerentanan SQL Injection...",
                    "Menyusun query aman berbasis Prepared Statements...",
                    "Mengikat parameter data menggunakan placeholder (?)",
                    "Memvalidasi penanganan error koneksi pool...",
                    "Menampilkan rancangan query backend aman..."
                ];
            }

            return [
                "Menginisialisasi lingkungan sandbox...",
                "Membaca spesifikasi instruksi logika...",
                "Menyusun algoritma eksekusi fungsi...",
                "Melakukan debugging internal runtime...",
                "Memformat kode ke standar produksi clean-code...",
                "Menampilkan hasil kompilasi skrip..."
            ];
        }

        let loadingInterval;

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const message = userInput.value.trim();
            if (!message) return;

            appendMessage('user', message);
            userInput.value = '';
            setLoading(true);

            const currentLoadingSteps = generateDynamicSteps(message);

            const botMessageId = appendMessage('bot', `
                <div class="flex items-center gap-2.5 text-slate-400 font-mono text-xs py-1">
                    <i class="fa-solid fa-circle-notch animate-spin text-purple-400"></i>
                    <span id="loading-text-log">${currentLoadingSteps[0]}</span>
                </div>
            `);

            let stepIndex = 0;
            const logElement = document.getElementById('loading-text-log');
            
            loadingInterval = setInterval(() => {
                if (stepIndex < currentLoadingSteps.length - 1) {
                    stepIndex++;
                    if(logElement) logElement.textContent = currentLoadingSteps[stepIndex];
                }
            }, 1000);

            try {
                const response = await fetch('https://text.pollinations.ai/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        messages: [
                            { role: "system", content: SYSTEM_PROMPT },
                            { role: "user", content: message }
                        ],
                        model: "openai",
                        jsonMode: false
                    })
                });

                if (!response.ok) throw new Error('Network Exception');

                const data = await response.text();
                clearInterval(loadingInterval);
                updateBotMessage(botMessageId, data);

            } catch (error) {
                console.error(error);
                clearInterval(loadingInterval);
                updateBotMessage(botMessageId, `<span class="text-rose-400 font-mono text-xs"><i class="fa-solid fa-triangle-exclamation mr-1"></i> Gagal memproses data. Silakan coba kembali.</span>`);
            } finally {
                setLoading(false);
            }
        });

        function appendMessage(sender, text) {
            const id = 'msg-' + Date.now();
            const msgDiv = document.createElement('div');
            const isUser = sender === 'user';
            
            msgDiv.className = `flex gap-4 items-start message-fade-in ${isUser ? 'justify-end' : ''}`;
            msgDiv.innerHTML = `
                ${!isUser ? `
                    <div class="w-6 h-6 rounded border border-slate-800 bg-slate-900/60 flex items-center justify-center text-purple-400 shrink-0 mt-1">
                        <i class="fa-solid fa-terminal text-[10px]"></i>
                    </div>
                ` : ''}
                <div id="${id}" class="${isUser ? 'bg-slate-900 border border-slate-800/80 rounded-xl px-4 py-2.5 max-w-[85%] text-sm text-slate-200' : 'flex-1 text-sm text-slate-300 leading-relaxed prose pl-3 border-l-2 border-purple-500/40'}">
                    ${isUser ? escapeHTML(text) : text}
                </div>
            `;
            
            chatBox.appendChild(msgDiv);
            chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });
            return id;
        }

        function updateBotMessage(id, rawMarkdown) {
            const container = document.getElementById(id);
            let htmlContent = marked.parse(rawMarkdown);
            container.innerHTML = htmlContent;

            container.querySelectorAll('pre').forEach((preElement) => {
                const wrapper = document.createElement('div');
                wrapper.className = "my-4 border border-slate-800 rounded-xl overflow-hidden shadow-lg group/code relative";
                
                let detectedLang = "CODE";
                const codeClass = preElement.querySelector('code')?.className || "";
                if(codeClass.includes('language-')) {
                    detectedLang = codeClass.split('language-')[1].toUpperCase();
                }

                const topBar = document.createElement('div');
                topBar.className = "bg-slate-950 px-4 py-2 text-[11px] font-mono text-slate-400 border-b border-slate-900 flex justify-between items-center select-none";
                topBar.innerHTML = `
                    <span>${detectedLang}</span>
                    <div class="flex items-center gap-3">
                        <button onclick="copyCodeToClipboard(this)" class="hover:text-purple-400 transition-colors flex items-center gap-1 cursor-pointer">
                            <i class="fa-regular fa-copy text-[10px]"></i> <span>Copy</span>
                        </button>
                        <button onclick="downloadCodeFile(this, '${detectedLang}')" class="hover:text-purple-400 transition-colors flex items-center gap-1 cursor-pointer">
                            <i class="fa-solid fa-arrow-down-to-line text-[10px]"></i> <span>Download</span>
                        </button>
                    </div>
                `;

                preElement.parentNode.insertBefore(wrapper, preElement);
                wrapper.appendChild(topBar);
                wrapper.appendChild(preElement);
            });

            container.querySelectorAll('pre code').forEach((el) => {
                hljs.highlightElement(el);
            });

            chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });
        }

        window.copyCodeToClipboard = function(buttonElement) {
            const preBlock = buttonElement.closest('.group\\/code').querySelector('pre');
            const actualCode = preBlock.textContent;

            navigator.clipboard.writeText(actualCode).then(() => {
                const span = buttonElement.querySelector('span');
                const icon = buttonElement.querySelector('i');
                span.textContent = "Copied!";
                icon.className = "fa-solid fa-check text-[10px] text-emerald-400";
                setTimeout(() => {
                    span.textContent = "Copy";
                    icon.className = "fa-regular fa-copy text-[10px]";
                }, 2000);
            });
        };

        window.downloadCodeFile = function(buttonElement, language) {
            const preBlock = buttonElement.closest('.group\\/code').querySelector('pre');
            const actualCode = preBlock.textContent;

            let ext = "txt";
            const langLower = language.toLowerCase();
            if (langLower.includes("js") || langLower.includes("javascript")) ext = "js";
            else if (langLower.includes("json")) ext = "json";
            else if (langLower.includes("py") || langLower.includes("python")) ext = "py";
            else if (langLower.includes("html")) ext = "html";
            else if (langLower.includes("php")) ext = "php";
            else if (langLower.includes("sql")) ext = "sql";

            const blob = new Blob([actualCode], { type: "text/plain;charset=utf-8" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `script_output_${Date.now()}.${ext}`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        };

        function setLoading(isLoading) {
            userInput.disabled = isLoading;
            sendBtn.disabled = isLoading;
            if(!isLoading) userInput.focus();
        }

        function escapeHTML(str) {
            if(str.includes('animate-spin') || str.includes('text-rose-400')) return str;
            return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag));
        }
    </script>
</body>
                </html>
